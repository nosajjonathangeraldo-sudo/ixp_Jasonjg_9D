<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background-image: linear-gradient(rgba(41,10,10,0.6),rgba(75,62,10,0.5)), url(https://lh3.googleusercontent.com/d/1JavqIoJsOonQJDEBgVDJjEeoFeGDf9Wi);
    background-size:cover;
    background-attachment:fixed;
    color:white;
}
h1 {
    text-align: center;
    margin: 20px 0;
}

.pdf-container {
    width: 80%;
    max-width: 900px;
    height: 80vh;
    border: 2px solid white;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #222;
}

.pdf-container embed {
    width: 100%;
    height: 100%;
}
.navbar{
    text-align:center;
    background-color: rgba(0,0,0,0.85);
    height:120px;
    width:100%;
    display:flex;
    justify-content:space-evenly;
    align-items:center;
}

.nav{
    font-size:25px;
    transition:0.4s;
}

.nav a{
    color:white;
    text-decoration:none;
}

.nav:hover{
    transform:scale(1.2);
}
footer{
    text-align:center;
    margin:40px;
    font-size:16px;
}
button{
    font-size:22px;
    padding:6px 15px;
    background:rgb(0, 47, 255);
    color:white;
    border:none;
    cursor:pointer;
}

button:hover{
    background:rgb(255, 60, 0);
}
.school-logo {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
}

</style>
