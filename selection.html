<title>Select Your Grade</title>

<style>

body{
    margin:0;
    font-family: Verdana, Geneva, Tahoma, sans-serif;
    background-image: linear-gradient(rgba(10,20,60,0.75), rgba(30,30,30,0.7)), url(https://lh3.googleusercontent.com/d/1yja7Rfzv9lxX_kJx1bkMD1x2NsSof9AL
);
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    }
h1{
    text-align:center;
    color:#f2f2f2;
    margin-top:70px;
    font-size:44px;
    letter-spacing:1px;
}
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:40px;
    margin-top:70px;
    padding:20px;
}
.card{
    width:420px;   
    padding:40px;
    background:white;
    text-align:center;
    border:3px solid black;
}


.card:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 25px rgba(0,0,0,0.35);
}

.card img{
    width:100%;
    height:260px;       
    object-fit:cover;
    border-radius:12px;
    margin-top:18px;
}
.card a{
    display:block;
    text-decoration:none;
    color:#222;
    font-size:34px;
    font-weight:600;
    margin-bottom:15px;
}
.school-logo {
    position: fixed; 
    top: 20px;
    right: 20px;
    width: 80px;
    height: auto;
    z-index: 5;
}
</style>
</head>
